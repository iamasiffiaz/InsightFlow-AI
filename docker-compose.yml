services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: insightflow
      POSTGRES_PASSWORD: insightflow
      POSTGRES_DB: insightflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow -d insightflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://insightflow:insightflow@db:5432/insightflow
      SECRET_KEY: insightflow-docker-secret
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
